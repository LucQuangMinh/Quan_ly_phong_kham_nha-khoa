<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký bệnh nhân - Nha Khoa Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #1d4ed8;
        }
        .message-box {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }
        .message-error {
            color: #dc2626;
            background: #fef2f2;
        }
        .message-success {
            color: #166534;
            background: #dcfce7;
        }
        .login-link {
            margin-top: 24px;
            font-size: 0.875rem;
            color: #64748b;
        }
        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo">🦷 Nha Khoa Care</div>
        <div class="subtitle">Đăng ký tài khoản bệnh nhân</div>
        
        <div class="message-box message-error" id="errorMessage"></div>
        <div class="message-box message-success" id="successMessage"></div>

        <form id="registerForm" autocomplete="off">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="username">Tên đăng nhập (*)</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập viết liền không dấu" required autocomplete="off">
                </div>
                <div class="form-group full-width">
                    <label for="password">Mật khẩu (*)</label>
                    <input type="password" id="password" placeholder="Tối thiểu 8 ký tự" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group full-width">
                    <label for="fullname">Họ và tên (*)</label>
                    <input type="text" id="fullname" placeholder="Vd: Nguyễn Văn A" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="abc@gmail.com">
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" placeholder="10-11 số">
                </div>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">Đăng ký</button>
        </form>

        <div class="login-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            submitBtn.textContent = 'Đang đăng ký...';
            submitBtn.disabled = true;

            const requestBody = {
                username: username,
                password: password,
                fullname: fullname,
                email: email,
                phone: phone,
                role: 'Bệnh nhân',
                status: 'Hoạt động'
            };

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = "Đăng ký thành công! Đang chuyển hướng đến trang đăng nhập...";
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMessage.textContent = data.message || "Đăng ký thất bại. Vui lòng kiểm tra lại thông tin.";
                    errorMessage.style.display = 'block';
                    submitBtn.textContent = 'Đăng ký';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                errorMessage.textContent = "Không thể kết nối đến máy chủ. Vui lòng thử lại sau.";
                errorMessage.style.display = 'block';
                submitBtn.textContent = 'Đăng ký';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
