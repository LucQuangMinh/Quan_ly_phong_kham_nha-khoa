<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Nha Khoa Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #1d4ed8;
        }
        .error-message {
            color: #dc2626;
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🦷 Nha Khoa Care</div>
        <div class="subtitle">Đăng nhập vào hệ thống quản lý</div>
        
        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="VD: admin, bacsi1, benhnhan1..." required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Đăng nhập</button>
        </form>
        
        <div style="margin-top: 24px; font-size: 0.875rem; color: #64748b;">
            Dành cho Bệnh nhân mới: <a href="register.html" style="color: #2563eb; text-decoration: none; font-weight: 600;">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorMessage.style.display = 'none';
            submitBtn.textContent = 'Đang đăng nhập...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();

                if (response.ok && data.success) {
                    // Lưu thông tin vào localStorage
                    localStorage.setItem('user', JSON.stringify({
                        id: data.id,
                        fullname: data.fullname,
                        role: data.role,
                        username: username
                    }));
                    
                    // Chuyển hướng dựa trên Role
                    if (data.role === 'Admin') {
                        window.location.href = 'users.html';
                    } else if (data.role === 'Bác sĩ') {
                        window.location.href = 'schedules.html';
                    } else if (data.role === 'Lễ tân') {
                        window.location.href = 'tracking.html';
                    } else if (data.role === 'Quản lý phòng khám') {
                        window.location.href = 'doctors.html';
                    } else {
                        window.location.href = 'appointments.html';
                    }
                } else {
                    errorMessage.textContent = data.message || "Tên đăng nhập hoặc mật khẩu không đúng.";
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = "Không thể kết nối đến máy chủ Backend. Vui lòng kiểm tra xem Spring Boot đã chạy ở port 8080 chưa.";
                errorMessage.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Đăng nhập';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
